name = "decoy-case-cura"

[pipeline]
stages = ["load", "arrange", "plate", "slice"]

[plate]
size = [256, 256]
padding = 5.0

[slicer]
engine = "cura"
version = "5.12.0"
bed_type = "Textured PEI Plate"
filaments = ["Generic PLA @base", "Generic ASA @base", "Generic PETG-CF @base", "Generic PLA @base"]

[slicer.overrides]
sparse_infill_density = "30%"

[[parts]]
file = "decoy_base.step"
filament = 3

[[parts]]
file = "decoy_shell.step"
orient = "upside-down"
filament = 3


