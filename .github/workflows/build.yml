name: Build STEP files

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build123d
        run: pip install build123d

      - name: Generate STEP files
        id: generate
        run: python decoy_case.py

      - name: Verify outputs
        id: verify
        run: |
          FILES=""
          for f in *.step; do
            if [ -f "$f" ]; then
              SIZE=$(du -h "$f" | cut -f1)
              FILES="${FILES}| \`${f}\` | ${SIZE} |\n"
            fi
          done
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          test -f decoy_base.step || { echo "decoy_base.step missing"; exit 1; }
          test -f decoy_shell.step || { echo "decoy_shell.step missing"; exit 1; }

      - uses: actions/upload-artifact@v7
        with:
          name: step-files
          path: "*.step"

      - name: Job summary
        run: |
          echo "### Build: STEP files" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo -e "${{ steps.verify.outputs.files }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          FILES: ${{ steps.verify.outputs.files }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const files = process.env.FILES || '';
            const runUrl = process.env.RUN_URL;
            const marker = '<!-- build-step-result -->';

            const body = [
              marker,
              '### Build: STEP files',
              '',
              '| File | Size |',
              '|------|------|',
              files.trim(),
              '',
              `> 📦 [Download **step-files**](${runUrl}#artifacts)`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
