name = "decoy-case"

[pipeline]
stages = ["load", "arrange", "plate", "slice"]

[plate]
size = [256, 256]
padding = 5.0

[slicer]
engine = "cura"
version = "5.12.0"
bed_type = "Textured PEI Plate"

[slicer.cura.overrides]
brim_type = "no_brim"
sparse_infill_density = "35%"
sparse_infill_pattern = "gyroid"

[[parts]]
file = "decoy_base.step"
orient = "upright"

[[parts]]
file = "decoy_shell.step"
orient = "upside-down"
