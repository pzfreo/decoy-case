name = "decoy-case"

[pipeline]
stages = ["load", "arrange", "plate", "slice", "print"]

[plate]
size = [256, 256]
padding = 5.0

[slicer]
engine = "orca"
version = "2.3.1"
printer = "Bambu Lab P1S 0.4 nozzle"
bed_type = "Textured PEI Plate"
process = "0.20mm Standard @BBL X1C"
filaments = ["Generic PLA @base", "Generic ASA @base", "Generic PETG-CF @base", "Generic PLA @base"]

[slicer.machine_overrides]
nozzle_type = "hardened_steel"

[slicer.filament_overrides]
required_nozzle_HRC = "0"

[slicer.overrides]
sparse_infill_density = "30%"

[[parts]]
file = "decoy_base.step"
filament = 3

[[parts]]
file = "decoy_shell.step"
filament = 3

[printer]
name = "workshop"
